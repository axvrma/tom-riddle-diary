<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tom Riddle's Diary</title>
    
    <!-- Using La Belle Aurore for a slightly eerie, authentic handwritten look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=La+Belle+Aurore&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="diary-container">
        <!-- The paper texture background -->
        <div class="paper-texture"></div>
        
        <!-- Overlay where Tom's responses will be typed out -->
        <div id="response-overlay"></div>
        
        <!-- Canvas for user drawing -->
        <canvas id="drawing-canvas"></canvas>
    </div>

    <!-- Loading indicator when AI is generating -->
    <div id="status-indicator"></div>

    <script src="app.js"></script>
</body>
</html>
